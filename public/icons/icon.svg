  <!-- Waveform bars -->
  <rect x="72" y="112" width="7" height="16" rx="3" fill="#00f0ff" opacity="0.8"/>
  <rect x="84" y="104" width="7" height="24" rx="3" fill="#ff00aa" opacity="0.9"/>
  <rect x="96" y="96" width="7" height="32" rx="3" fill="#00f0ff"/>
